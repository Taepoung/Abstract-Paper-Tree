<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynote — Keyword Pattern Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; font-weight: 800; }
        .kw-pill { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; font-weight: 600; border: 1.5px solid; white-space: nowrap; transition: all 0.15s; }
        .kw-pill:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        @keyframes slideUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .group-card { transition: all 0.2s; }
        .group-card:hover { border-color: #fb923c; }
        .group-card.expanded .expand-icon { transform: rotate(180deg); }
    </style>
</head>

<body class="min-h-screen p-4 sm:p-6 md:p-12">
<div class="max-w-7xl mx-auto space-y-8">

    <!-- Header -->
    <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-b border-slate-200 pb-6">
        <div class="space-y-1.5">
            <h1 class="text-2xl sm:text-4xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-3">
                <span class="w-8 h-8 sm:w-10 sm:h-10 accent-gradient rounded-xl shadow-lg shadow-orange-200 flex-shrink-0"></span>
                <span>Keynote</span>
            </h1>
            <p class="text-slate-400 font-medium tracking-tight text-sm">Keyword Pattern Dashboard</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <a href="keynote_tree.html" class="inline-flex items-center gap-1.5 px-3 sm:px-4 py-2 bg-white border border-slate-100 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-orange-500 hover:border-orange-200 transition-all card-shadow">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                <span class="hidden sm:inline">Tree View</span>
            </a>
            <nav class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchAxis('tool')" id="tab-tool"
                    class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all tab-active">Tool</button>
                <button onclick="switchAxis('technique')" id="tab-technique"
                    class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Technique</button>
            </nav>
            <div id="type-filter" class="flex flex-wrap gap-1.5"></div>
        </div>
    </header>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div class="bg-white p-5 rounded-2xl card-shadow border border-slate-100 text-center">
            <p class="text-2xl font-extrabold text-slate-900" id="stat-papers">0</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Papers</p>
        </div>
        <div class="bg-white p-5 rounded-2xl card-shadow border border-slate-100 text-center">
            <p class="text-2xl font-extrabold text-slate-900" id="stat-groups">0</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Groups</p>
        </div>
        <div class="bg-white p-5 rounded-2xl card-shadow border border-slate-100 text-center">
            <p class="text-2xl font-extrabold text-slate-900" id="stat-keywords">0</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Keywords</p>
        </div>
        <div class="bg-white p-5 rounded-2xl card-shadow border border-slate-100 text-center">
            <p class="text-2xl font-extrabold text-slate-900" id="stat-types">0</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Types</p>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
        <div class="lg:col-span-2 bg-white p-5 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] card-shadow border border-slate-100 space-y-5">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <h3 class="text-xl font-bold text-slate-800">Group Distribution</h3>
            </div>
            <div class="relative" id="chart-container" style="height:300px;">
                <canvas id="groupChart"></canvas>
            </div>
            <p class="text-xs text-slate-400 italic text-center">click a bar to scroll to the group details</p>
        </div>

        <!-- Selected Group Summary -->
        <div class="space-y-6">
            <div id="group-summary-card" class="bg-gradient-to-br from-orange-500 to-orange-600 p-5 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] text-white shadow-xl shadow-orange-100 space-y-4 animate-slide-up">
                <h5 class="text-lg font-extrabold" id="selected-group-name">Group Details</h5>
                <p class="text-orange-50 text-sm leading-relaxed" id="selected-group-summary">Click a bar in the chart to see the group summary here.</p>
                <div id="selected-group-keywords" class="flex flex-wrap gap-1.5"></div>
            </div>
        </div>
    </div>

    <!-- Group Cards -->
    <section id="groups-section" class="space-y-6 pb-20"></section>

</div>

<script>
    /**
     * DATA_INJECTION_POINT_START
     */
    const keynoteData = {};
    const paperLookup = {};
    /**
     * DATA_INJECTION_POINT_END
     */

    const TYPE_CONFIG = {
        Method:     { color: 'rgba(59,130,246,0.85)',  border: '#3b82f6', pill: 'bg-blue-50 text-blue-500 border-blue-200',      kw: '#dbeafe', kwBorder: '#3b82f6', kwText: '#1d4ed8' },
        Empirical:  { color: 'rgba(34,197,94,0.85)',   border: '#22c55e', pill: 'bg-green-50 text-green-600 border-green-200',   kw: '#dcfce7', kwBorder: '#22c55e', kwText: '#15803d' },
        Qualitative:{ color: 'rgba(168,85,247,0.85)',  border: '#a855f7', pill: 'bg-purple-50 text-purple-500 border-purple-200',kw: '#f3e8ff', kwBorder: '#a855f7', kwText: '#7e22ce' },
        Benchmark:  { color: 'rgba(234,179,8,0.85)',   border: '#eab308', pill: 'bg-yellow-50 text-yellow-600 border-yellow-200',kw: '#fef9c3', kwBorder: '#eab308', kwText: '#854d0e' },
        Survey:     { color: 'rgba(100,116,139,0.85)', border: '#64748b', pill: 'bg-slate-100 text-slate-500 border-slate-200',  kw: '#f1f5f9', kwBorder: '#64748b', kwText: '#334155' },
    };
    const ALL_TYPES = Object.keys(TYPE_CONFIG);

    let currentAxis = 'tool';
    let activeTypes = new Set(ALL_TYPES);
    let myChart = null;

    function escapeHTML(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
    }

    // Get axis data, return flat array of groups with their research_type attached
    function getAxisGroups() {
        const axisData = keynoteData[currentAxis] || {};
        const groups = [];
        for (const [rtype, arr] of Object.entries(axisData)) {
            if (!activeTypes.has(rtype)) continue;
            (arr || []).forEach(g => groups.push({ ...g, research_type: rtype }));
        }
        return groups;
    }

    function getAvailableTypes() {
        const axisData = keynoteData[currentAxis] || {};
        return ALL_TYPES.filter(t => axisData[t] && axisData[t].length > 0);
    }

    // Type filter buttons
    function initTypeFilter() {
        const el = document.getElementById('type-filter');
        el.innerHTML = '';
        const available = getAvailableTypes();
        available.forEach(type => {
            const btn = document.createElement('button');
            btn.dataset.type = type;
            btn.className = `text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full border transition-all ${TYPE_CONFIG[type].pill}`;
            btn.textContent = type;
            btn.onclick = () => toggleType(type);
            el.appendChild(btn);
        });
    }

    function toggleType(type) {
        if (activeTypes.has(type)) activeTypes.delete(type);
        else activeTypes.add(type);
        if (activeTypes.size === 0) activeTypes = new Set(ALL_TYPES);
        document.querySelectorAll('#type-filter button').forEach(btn => {
            btn.style.opacity = activeTypes.has(btn.dataset.type) ? '1' : '0.3';
        });
        updateStats();
        renderChart();
        renderGroups();
    }

    function switchAxis(axis) {
        currentAxis = axis;
        document.getElementById('tab-tool').classList.toggle('tab-active', axis === 'tool');
        document.getElementById('tab-technique').classList.toggle('tab-active', axis === 'technique');
        document.getElementById('tab-tool').classList.toggle('text-slate-400', axis !== 'tool');
        document.getElementById('tab-technique').classList.toggle('text-slate-400', axis !== 'technique');
        activeTypes = new Set(ALL_TYPES);
        initTypeFilter();
        updateStats();
        renderChart();
        renderGroups();
        resetSummaryCard();
    }

    function updateStats() {
        const groups = getAxisGroups();
        const allFilenames = new Set();
        const allKeywords = new Set();
        groups.forEach(g => {
            (g.filenames || []).forEach(f => allFilenames.add(f));
            (g.keywords || []).forEach(k => allKeywords.add(k));
        });
        const available = getAvailableTypes().filter(t => activeTypes.has(t));
        document.getElementById('stat-papers').textContent = allFilenames.size;
        document.getElementById('stat-groups').textContent = groups.length;
        document.getElementById('stat-keywords').textContent = allKeywords.size;
        document.getElementById('stat-types').textContent = available.length;
    }

    function renderChart() {
        const groups = getAxisGroups();
        const labels = groups.map(g => g.name);
        const data = groups.map(g => (g.filenames || []).length);

        const chartH = Math.max(250, labels.length * 50);
        document.getElementById('chart-container').style.height = chartH + 'px';

        if (myChart) myChart.destroy();
        const ctx = document.getElementById('groupChart').getContext('2d');

        // Color each bar by its research_type
        const bgColors = groups.map(g => (TYPE_CONFIG[g.research_type] || TYPE_CONFIG.Method).color);
        const bdColors = groups.map(g => (TYPE_CONFIG[g.research_type] || TYPE_CONFIG.Method).border);

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Papers',
                    data,
                    backgroundColor: bgColors,
                    borderColor: bdColors,
                    borderWidth: 0,
                    borderRadius: 6,
                    barThickness: 28,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: '#1e293b', padding: 12, titleFont: { size: 13, weight: 'bold' }, cornerRadius: 8 }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { stepSize: 1, font: { weight: 'bold' } } },
                    y: {
                        grid: { borderDash: [5,5], color: '#e2e8f0' },
                        ticks: {
                            font: { size: 12, weight: '600' }, color: '#64748b',
                            callback: function(v) { const l = this.getLabelForValue(v); return l.length > 28 ? l.substr(0,28)+'...' : l; }
                        }
                    }
                },
                onClick: (evt, els) => {
                    if (els.length > 0) {
                        const idx = els[0].index;
                        const group = groups[idx];
                        showGroupSummary(group);
                        const el = document.getElementById('group-' + idx);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }
        });
    }

    function showGroupSummary(group) {
        document.getElementById('selected-group-name').textContent = group.name;
        document.getElementById('selected-group-summary').textContent = group.summary || '';
        const kwContainer = document.getElementById('selected-group-keywords');
        kwContainer.innerHTML = '';
        (group.keywords || []).forEach(kw => {
            const span = document.createElement('span');
            span.className = 'text-[10px] font-bold px-2 py-0.5 rounded-full bg-white/20 text-white/90 border border-white/30';
            span.textContent = kw;
            kwContainer.appendChild(span);
        });
    }

    function resetSummaryCard() {
        document.getElementById('selected-group-name').textContent = 'Group Details';
        document.getElementById('selected-group-summary').textContent = 'Click a bar in the chart to see the group summary here.';
        document.getElementById('selected-group-keywords').innerHTML = '';
    }

    function renderGroups() {
        const groups = getAxisGroups();
        const section = document.getElementById('groups-section');
        section.innerHTML = '';

        groups.forEach((group, idx) => {
            const cfg = TYPE_CONFIG[group.research_type] || TYPE_CONFIG.Method;
            const card = document.createElement('div');
            card.id = 'group-' + idx;
            card.className = 'group-card bg-white rounded-[2rem] card-shadow border border-slate-100 animate-slide-up overflow-hidden';
            card.style.animationDelay = (idx * 0.05) + 's';
            card.style.opacity = '0';

            const papers = (group.filenames || []).map(fn => paperLookup[fn]).filter(Boolean);

            card.innerHTML = `
                <div class="p-5 sm:p-8 space-y-4 cursor-pointer" onclick="toggleGroup(${idx})">
                    <div class="flex items-start justify-between gap-3">
                        <div class="space-y-2 flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h4 class="text-lg font-extrabold text-slate-800">${escapeHTML(group.name)}</h4>
                                <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full border ${cfg.pill}">${escapeHTML(group.research_type)}</span>
                                <span class="text-xs font-bold text-orange-400 bg-orange-50 px-2 py-1 rounded-lg">${papers.length} papers</span>
                            </div>
                            <p class="text-sm text-slate-500 leading-relaxed">${escapeHTML(group.summary)}</p>
                        </div>
                        <svg class="expand-icon w-5 h-5 text-slate-400 flex-shrink-0 transition-transform mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                    <div class="flex flex-wrap gap-1.5">
                        ${(group.keywords || []).map(kw => `<span class="kw-pill text-[11px] px-2.5 py-0.5" style="background:${cfg.kw};border-color:${cfg.kwBorder};color:${cfg.kwText};">${escapeHTML(kw)}</span>`).join('')}
                    </div>
                </div>
                <div id="group-papers-${idx}" class="hidden border-t border-slate-100 p-5 sm:p-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${papers.map(p => buildPaperHTML(p, cfg)).join('')}
                    </div>
                </div>
            `;
            section.appendChild(card);
        });
    }

    function toggleGroup(idx) {
        const papersEl = document.getElementById('group-papers-' + idx);
        const card = papersEl.closest('.group-card');
        papersEl.classList.toggle('hidden');
        card.classList.toggle('expanded');
    }

    function buildPaperHTML(p, cfg) {
        const kws = (p.keywords || []).map(k =>
            `<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full border bg-slate-100 text-slate-500 border-slate-200">${escapeHTML(k)}</span>`
        ).join('');
        return `
            <div class="bg-slate-50 p-4 rounded-2xl space-y-2">
                <span class="text-[9px] font-bold text-orange-400 uppercase tracking-widest bg-orange-50 px-1.5 py-0.5 rounded-md">${escapeHTML(p.filename)}</span>
                <h6 class="text-sm font-bold text-slate-800 leading-tight">${escapeHTML(p.title)}</h6>
                <p class="text-xs text-slate-500 leading-relaxed">${escapeHTML(p.methodology)}</p>
                <div class="flex flex-wrap gap-1 pt-1">${kws}</div>
            </div>
        `;
    }

    // Init
    if (keynoteData.tool || keynoteData.technique) {
        initTypeFilter();
        updateStats();
        renderChart();
        renderGroups();
    } else {
        document.getElementById('groups-section').innerHTML = '<p class="text-center text-slate-400 py-12">No data available.</p>';
    }
</script>
</body>
</html>
