<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynote — Cluster Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; font-weight: 800; }
        #tree-svg { cursor: grab; }
        #tree-svg:active { cursor: grabbing; }
        .node { cursor: pointer; }
        .node circle { transition: r 0.15s ease; }
        .node:hover circle { filter: drop-shadow(0 0 6px rgba(249,115,22,0.5)); }
        .link { fill: none; stroke: #e2e8f0; stroke-width: 1.5px; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-7xl mx-auto space-y-8">

        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-b border-slate-200 pb-6">
            <div class="space-y-1">
                <h1 class="text-2xl sm:text-4xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-3">
                    <span class="w-8 h-8 sm:w-10 sm:h-10 accent-gradient rounded-xl shadow-lg shadow-orange-200 flex-shrink-0"></span>
                    <span class="min-w-0 break-words">Keynote Tree</span>
                </h1>
                <p class="text-slate-400 font-medium tracking-tight text-sm">Radial Hierarchy of Keyword Patterns</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <nav class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                    <button onclick="switchTab('tool')" id="tab-tool"
                        class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all tab-active">Tool</button>
                    <button onclick="switchTab('technique')" id="tab-technique"
                        class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Technique</button>
                </nav>
                <a href="keynote.html" class="inline-flex items-center gap-1.5 px-3 sm:px-4 py-2 bg-white border border-slate-100 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-orange-500 hover:border-orange-200 transition-all card-shadow">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <span class="hidden sm:inline">Dashboard</span>
                </a>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 lg:items-start">
            <div class="w-full flex-grow bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden" id="tree-container">
                <svg id="tree-svg" width="100%" height="500" style="touch-action:pan-x pan-y;"></svg>
            </div>
            <div class="lg:w-72 flex-shrink-0 space-y-4">
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-2xl font-extrabold text-slate-900" id="total-count">—</p>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Keywords</p>
                    </div>
                </div>
                <div id="detail-card" class="bg-gradient-to-br from-orange-500 to-orange-600 p-6 rounded-[2rem] text-white card-shadow shadow-orange-100 space-y-3 animate-slide-up">
                    <p class="text-xs font-bold uppercase tracking-widest text-orange-200" id="detail-label">Select a node</p>
                    <h5 class="text-base font-extrabold leading-snug" id="detail-name">—</h5>
                    <div class="flex items-center gap-2">
                        <span class="text-2xl font-extrabold" id="detail-count">—</span>
                        <span class="text-orange-200 text-sm font-semibold" id="detail-count-label">papers</span>
                    </div>
                    <p class="text-orange-100 text-xs leading-relaxed" id="detail-summary"></p>
                    <div id="detail-keywords" class="hidden flex-wrap gap-1"></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 space-y-3">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Type Filter</p>
                    <div id="tree-type-filter" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 space-y-3">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Legend</p>
                    <div class="space-y-2.5">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full bg-orange-500 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Root</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full bg-white border-2 border-orange-400 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Group</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-3 rounded-full flex-shrink-0 ml-0.5" style="background:linear-gradient(90deg, #93c5fd 50%, #86efac 50%); border:1px solid #3b82f6;"></div>
                            <span class="text-xs font-semibold text-slate-600">Split pill (multi-type)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-center text-xs text-slate-300 italic">Drag to pan, scroll to zoom. Click nodes for details.</p>

        <div id="level-list" class="space-y-6 pb-8"></div>
    </div>

    <script>
        /**
         * DATA_INJECTION_POINT_START
         */
        const toolTreeData = {};
        const techniqueTreeData = {};
        const toolKwTypeMap = {};
        const techniqueKwTypeMap = {};
        /**
         * DATA_INJECTION_POINT_END
         */

        const TYPE_CONFIG = {
            Method:     { pill: 'bg-blue-50 text-blue-500 border-blue-200' },
            Empirical:  { pill: 'bg-green-50 text-green-600 border-green-200' },
            Qualitative:{ pill: 'bg-purple-50 text-purple-500 border-purple-200' },
            Benchmark:  { pill: 'bg-yellow-50 text-yellow-600 border-yellow-200' },
            Survey:     { pill: 'bg-slate-100 text-slate-500 border-slate-200' },
        };
        const SPLIT_COLORS = { Method:'#93c5fd', Empirical:'#86efac', Qualitative:'#c4b5fd', Benchmark:'#fcd34d', Survey:'#94a3b8' };
        const SPLIT_BORDERS = { Method:'#3b82f6', Empirical:'#22c55e', Qualitative:'#a855f7', Benchmark:'#eab308', Survey:'#64748b' };
        const ALL_TYPES = Object.keys(TYPE_CONFIG);
        let activeTypes = new Set(ALL_TYPES);
        let currentRawData = null;

        // Type filter UI
        (function initTypeFilter() {
            const el = document.getElementById('tree-type-filter');
            ALL_TYPES.forEach(type => {
                const btn = document.createElement('button');
                btn.dataset.type = type;
                btn.className = `text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full border transition-all ${TYPE_CONFIG[type].pill}`;
                btn.textContent = type;
                btn.onclick = () => {
                    if (activeTypes.has(type)) activeTypes.delete(type);
                    else activeTypes.add(type);
                    if (activeTypes.size === 0) activeTypes = new Set(ALL_TYPES);
                    el.querySelectorAll('button').forEach(b => { b.style.opacity = activeTypes.has(b.dataset.type) ? '1' : '0.3'; });
                    rerender();
                };
                el.appendChild(btn);
            });
        })();

        function filterTree(data) {
            if (!data || !data.children) return data;
            const filtered = data.children.filter(g => {
                const types = g.research_types || [];
                return types.some(t => activeTypes.has(t));
            });
            // count = unique keywords that belong to at least one active type
            const allKws = new Set();
            filtered.forEach(g => (g.keywords || []).forEach(kw => {
                const types = getKwTypes(kw);
                if ([...types].some(t => activeTypes.has(t))) allKws.add(kw);
            }));
            return { ...data, children: filtered, count: allKws.size };
        }

        function rerender() {
            if (!currentRawData) return;
            renderTree(filterTree(currentRawData), true);
        }

        let currentKwTypeMap = toolKwTypeMap;

        function getKwTypes(kw) {
            const types = currentKwTypeMap[kw];
            if (!types) return new Set();
            return new Set(types);
        }

        // Sort: per type in ALL_TYPES order → single first, then multi containing that type, alphabetical within each
        function sortKwsByTypeCount(kws) {
            const result = [];
            const used = new Set();
            for (const type of ALL_TYPES) {
                if (!activeTypes.has(type)) continue;
                const singles = kws.filter(kw => {
                    if (used.has(kw)) return false;
                    const active = [...getKwTypes(kw)].filter(t => activeTypes.has(t));
                    return active.length === 1 && active[0] === type;
                }).sort((a, b) => a.localeCompare(b));
                singles.forEach(kw => { result.push(kw); used.add(kw); });
                const multis = kws.filter(kw => {
                    if (used.has(kw)) return false;
                    const active = [...getKwTypes(kw)].filter(t => activeTypes.has(t));
                    return active.length > 1 && active.includes(type);
                }).sort((a, b) => {
                    const ac = [...getKwTypes(a)].filter(t => activeTypes.has(t)).length;
                    const bc = [...getKwTypes(b)].filter(t => activeTypes.has(t)).length;
                    return ac !== bc ? ac - bc : a.localeCompare(b);
                });
                multis.forEach(kw => { result.push(kw); used.add(kw); });
            }
            return result;
        }

        function buildSplitPill(kw, typesSet) {
            const types = ALL_TYPES.filter(t => (typesSet || new Set()).has(t) && activeTypes.has(t));
            if (types.length === 0) return '';
            const colors = types.map(t => SPLIT_COLORS[t] || '#f1f5f9');
            const borders = types.map(t => SPLIT_BORDERS[t] || '#94a3b8');
            let bg, border;
            if (colors.length === 1) { bg = colors[0]; border = borders[0]; }
            else {
                const step = 100 / colors.length;
                bg = `linear-gradient(90deg, ${colors.map((c, i) => `${c} ${(i*step).toFixed(1)}% ${((i+1)*step).toFixed(1)}%`).join(', ')})`;
                border = borders[0];
            }
            return `<span class="text-[11px] font-semibold px-2.5 py-1 rounded-full text-slate-700 cursor-pointer hover:opacity-80 transition-opacity" style="background:${bg};border:1.5px solid ${border};">${kw}</span>`;
        }

        const svgEl = document.getElementById('tree-svg');
        const container = document.getElementById('tree-container');

        function maxLeaves(d) { if (!d || !d.children || !d.children.length) return 1; return d.children.reduce((s, c) => s + maxLeaves(c), 0); }
        function calcCanvasSize(data) {
            const lc = Math.max(maxLeaves(data), 1);
            const r = Math.max(180, Math.ceil((lc * 32) / (2 * Math.PI)));
            return 2 * (r + 120);
        }
        function getSvgSize() {
            const w = svgEl.getBoundingClientRect().width || svgEl.clientWidth || container.clientWidth || window.innerWidth - 32;
            return [w, parseFloat(svgEl.getAttribute('height')) || 500];
        }
        function updateHeight() { svgEl.setAttribute('height', Math.max(350, Math.min(window.innerHeight - 150, 700))); }
        updateHeight();

        const svg = d3.select('#tree-svg');
        const zoomGroup = svg.append('g');
        const zoom = d3.zoom().scaleExtent([0.1, 6]).on('zoom', e => zoomGroup.attr('transform', e.transform));
        svg.call(zoom);

        function fitView() {
            const bbox = zoomGroup.node().getBBox();
            if (!bbox.width || !bbox.height) return;
            const [w, h] = getSvgSize();
            const pad = 40;
            const scale = Math.min(w / (bbox.width + pad * 2), h / (bbox.height + pad * 2), 1.5);
            svg.call(zoom.transform, d3.zoomIdentity.translate(w/2 - (bbox.x + bbox.width/2)*scale, h/2 - (bbox.y + bbox.height/2)*scale).scale(scale));
        }
        new ResizeObserver(() => { updateHeight(); requestAnimationFrame(fitView); }).observe(container);

        function switchTab(type) {
            document.getElementById('tab-tool').classList.toggle('tab-active', type === 'tool');
            document.getElementById('tab-technique').classList.toggle('tab-active', type === 'technique');
            document.getElementById('tab-tool').classList.toggle('text-slate-400', type !== 'tool');
            document.getElementById('tab-technique').classList.toggle('text-slate-400', type !== 'technique');
            currentRawData = type === 'tool' ? toolTreeData : techniqueTreeData;
            currentKwTypeMap = type === 'tool' ? toolKwTypeMap : techniqueKwTypeMap;
            renderTree(filterTree(currentRawData), true);
        }

        let _nodeRadiusRoot = 28, _nodeRadiusGroup = 16;
        function nodeRadius(d) { return d.depth === 0 ? _nodeRadiusRoot : _nodeRadiusGroup; }
        function toXY(d) { return [d.y * Math.sin(d.x), -d.y * Math.cos(d.x)]; }

        function renderTree(data, skipStore) {
            if (!skipStore) currentRawData = data;
            zoomGroup.selectAll('*').remove();
            svg.call(zoom.transform, d3.zoomIdentity);
            if (!data) return;
            const hasChildren = data.children?.length > 0;
            document.getElementById('total-count').innerText = data.count ?? '—';

            const root = d3.hierarchy(data);
            const maxDepth = d3.max(root.descendants(), d => d.depth) || 1;
            const GAP = 10, MARGIN = 1.5;

            function assignSectors(node, start, end) {
                node._start = start; node._end = end; node.x = (start + end) / 2;
                if (!node.children || !node.children.length) return;
                const step = (end - start) / node.children.length;
                node.children.forEach((c, i) => assignSectors(c, start + i * step, start + (i + 1) * step));
            }
            assignSectors(root, 0, 2 * Math.PI);

            const minRByDepth = new Array(maxDepth + 1).fill(0);
            root.each(d => {
                if (d.depth === 0) return;
                const w = d._end - d._start, sinHalf = Math.sin(w / 2);
                const need = (2 * nodeRadius(d) + GAP) * MARGIN;
                minRByDepth[d.depth] = Math.max(minRByDepth[d.depth], sinHalf < 1e-9 ? need / Math.max(w, 1e-9) : need / (2 * sinHalf));
            });
            for (let i = 1; i <= maxDepth; i++) minRByDepth[i] = Math.max(minRByDepth[i], minRByDepth[i-1] + GAP);

            const canvasSize = calcCanvasSize(data);
            const radius = canvasSize / 2 - 15;
            const sizeScale = Math.sqrt(canvasSize / 600);
            _nodeRadiusRoot = Math.round(28 * sizeScale);
            _nodeRadiusGroup = Math.round(16 * sizeScale);
            const fontRoot = Math.round(11 * sizeScale * 1.4);
            const cx = canvasSize / 2, cy = canvasSize / 2;
            const g = zoomGroup.append('g').attr('transform', `translate(${cx},${cy})`);

            if (!hasChildren) {
                g.append('circle').attr('r', 28).attr('fill', '#f97316');
                g.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                    .attr('font-size', '11px').attr('font-weight', '800').attr('fill', '#fff').text(data.count ?? '');
                requestAnimationFrame(fitView); return;
            }

            const rScale = minRByDepth[maxDepth] > radius ? radius / minRByDepth[maxDepth] : 1;
            root.each(d => { d.y = d.depth === 0 ? 0 : minRByDepth[d.depth] * rScale; });

            // Links
            g.append('g').selectAll('path').data(root.links()).join('path')
                .attr('class', 'link')
                .attr('d', d => { const [px,py]=toXY(d.source),[cx2,cy2]=toXY(d.target); return `M${px.toFixed(1)},${py.toFixed(1)} L${cx2.toFixed(1)},${cy2.toFixed(1)}`; });

            // Duplicate keyword detection across groups
            const dupKws = new Set();
            const kwGroupCount = {};
            (currentRawData.children || []).forEach(g => {
                (g.keywords || []).forEach(kw => { kwGroupCount[kw] = (kwGroupCount[kw] || 0) + 1; });
            });
            for (const [kw, cnt] of Object.entries(kwGroupCount)) {
                if (cnt > 1) dupKws.add(kw);
            }

            // Nodes
            const node = g.append('g')
                .selectAll('g').data(root.descendants()).join('g')
                .attr('class', 'node')
                .attr('transform', d => { const [x,y]=toXY(d); return `translate(${x},${y})`; })
                .on('mouseover', function(_, d) { d3.select(this).select('circle').attr('r', nodeRadius(d) * 1.4); showDetail(d.data); })
                .on('mouseout', function(_, d) { d3.select(this).select('circle').attr('r', nodeRadius(d)); });

            node.append('circle').attr('r', nodeRadius)
                .attr('fill', d => d.depth === 0 ? '#f97316' : '#ffffff')
                .attr('stroke', d => d.depth === 0 ? 'none' : '#f97316')
                .attr('stroke-width', d => d.depth === 0 ? 0 : 1.5);

            // Root: group count
            node.filter(d => d.depth === 0).append('text')
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', `${fontRoot}px`).attr('font-weight', '800').attr('fill', '#fff')
                .attr('pointer-events', 'none').text(d => d.data.count ?? '');

            // Group: keyword count inside circle
            const fontGroup = Math.round(10 * sizeScale * 1.4);
            node.filter(d => d.depth > 0).append('text')
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', `${fontGroup}px`).attr('font-weight', '700').attr('fill', '#f97316')
                .attr('pointer-events', 'none')
                .text(d => (d.data.keywords || []).filter(kw => { const t = getKwTypes(kw); return [...t].some(x => activeTypes.has(x)); }).length);

            node.filter(d => d.depth > 0).style('cursor', 'pointer')
                .on('click', function(event, d) { event.stopPropagation(); showDetail(d.data); scrollToDetail(); });

            // Level list: groups + keywords with split pills
            const levelList = document.getElementById('level-list');
            levelList.innerHTML = '';

            const groupNodes = root.descendants().filter(d => d.depth > 0);
            if (groupNodes.length) {
                // Groups
                const gSection = document.createElement('div');
                gSection.className = 'bg-white rounded-[2rem] card-shadow border border-slate-100 p-6 space-y-4';
                gSection.innerHTML = `<p class="text-xs font-black text-orange-500 uppercase tracking-widest">Groups — ${groupNodes.length} total</p>`;
                const gList = document.createElement('div');
                gList.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2';
                groupNodes.forEach(n => {
                    const item = document.createElement('button');
                    item.className = 'text-left p-3 rounded-xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50 transition-all group';
                    const kwCount = (n.data.keywords || []).filter(kw => [...getKwTypes(kw)].some(t => activeTypes.has(t))).length;
                    item.innerHTML = `<p class="text-sm font-bold text-slate-700 group-hover:text-orange-600 leading-snug">${n.data.name}</p><p class="text-xs text-orange-500 mt-0.5 font-semibold">${kwCount} keywords</p>`;
                    item.onclick = () => { showDetail(n.data); scrollToDetail(); };
                    gList.appendChild(item);
                });
                gSection.appendChild(gList);
                levelList.appendChild(gSection);

                // Keywords with split pills grouped by parent (filtered by active types)
                const allKws = new Set();
                groupNodes.forEach(n => (n.data.keywords || []).forEach(kw => {
                    if ([...getKwTypes(kw)].some(t => activeTypes.has(t))) allKws.add(kw);
                }));
                if (allKws.size) {
                    const filteredDupCount = [...dupKws].filter(kw => allKws.has(kw)).length;
                    const kwSection = document.createElement('div');
                    kwSection.className = 'bg-white rounded-[2rem] card-shadow border border-slate-100 p-6 space-y-4';
                    kwSection.innerHTML = `<p class="text-xs font-black text-orange-500 uppercase tracking-widest">Keywords — ${allKws.size} unique${filteredDupCount ? ` · ${filteredDupCount} shared` : ''}</p>`;
                    groupNodes.forEach(n => {
                        const kws = sortKwsByTypeCount((n.data.keywords || []).filter(kw => [...getKwTypes(kw)].some(t => activeTypes.has(t))));
                        if (!kws.length) return;
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'space-y-2';
                        const label = document.createElement('p');
                        label.className = 'text-xs font-bold text-slate-400 pl-1';
                        label.textContent = '\u25b8 ' + n.data.name;
                        groupDiv.appendChild(label);
                        const kwList = document.createElement('div');
                        kwList.className = 'flex flex-wrap gap-1.5';
                        kwList.innerHTML = kws.map(kw => buildSplitPill(kw, getKwTypes(kw))).join('');
                        groupDiv.appendChild(kwList);
                        kwSection.appendChild(groupDiv);
                    });
                    levelList.appendChild(kwSection);
                }
            }

            requestAnimationFrame(fitView);
        }

        function showDetail(data) {
            document.getElementById('detail-name').innerText = data.name;
            document.getElementById('detail-label').textContent = 'Group';
            const kwCount = (data.keywords || []).filter(kw => [...getKwTypes(kw)].some(t => activeTypes.has(t))).length;
            document.getElementById('detail-count').innerText = kwCount || '—';
            document.getElementById('detail-count-label').innerText = 'keywords';
            document.getElementById('detail-summary').innerText = data.summary || '';
            const kwEl = document.getElementById('detail-keywords');
            kwEl.classList.add('hidden'); kwEl.style.display = '';
            const card = document.getElementById('detail-card');
            card.classList.remove('animate-slide-up'); void card.offsetWidth; card.classList.add('animate-slide-up');
        }

        function scrollToDetail() {
            document.getElementById('detail-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        currentRawData = toolTreeData;
        renderTree(filterTree(toolTreeData), true);
    </script>
</body>
</html>
