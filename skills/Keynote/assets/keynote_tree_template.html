<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynote — Cluster Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; font-weight: 800; }
        #tree-svg { cursor: grab; }
        #tree-svg:active { cursor: grabbing; }
        .node { cursor: pointer; }
        .node circle { transition: r 0.15s ease; }
        .node:hover circle { filter: drop-shadow(0 0 6px rgba(249,115,22,0.5)); }
        .link { fill: none; stroke: #e2e8f0; stroke-width: 1.5px; }
        .dup-link { fill: none; stroke: #818cf8; stroke-width: 1.5px; stroke-dasharray: 5,4; opacity: 0.5; transition: opacity 0.15s, stroke-width 0.15s; }
        .dup-link.highlighted { opacity: 1; stroke-width: 2.5px; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-7xl mx-auto space-y-8">

        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-b border-slate-200 pb-6">
            <div class="space-y-1">
                <h1 class="text-2xl sm:text-4xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-3">
                    <span class="w-8 h-8 sm:w-10 sm:h-10 accent-gradient rounded-xl shadow-lg shadow-orange-200 flex-shrink-0"></span>
                    <span class="min-w-0 break-words">Keynote Tree</span>
                </h1>
                <p class="text-slate-400 font-medium tracking-tight text-sm">Radial Hierarchy of Keyword Patterns</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <nav class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                    <button onclick="switchTab('tool')" id="tab-tool"
                        class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all tab-active">Tool</button>
                    <button onclick="switchTab('technique')" id="tab-technique"
                        class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Technique</button>
                </nav>
                <a href="keynote.html" class="inline-flex items-center gap-1.5 px-3 sm:px-4 py-2 bg-white border border-slate-100 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-orange-500 hover:border-orange-200 transition-all card-shadow">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <span class="hidden sm:inline">Dashboard</span>
                </a>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 lg:items-start">
            <div class="w-full flex-grow bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden" id="tree-container">
                <svg id="tree-svg" width="100%" height="500" style="touch-action:pan-x pan-y;"></svg>
            </div>
            <div class="lg:w-72 flex-shrink-0 space-y-4">
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-2xl font-extrabold text-slate-900" id="total-count">—</p>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Papers</p>
                    </div>
                </div>
                <div id="detail-card" class="bg-gradient-to-br from-orange-500 to-orange-600 p-6 rounded-[2rem] text-white card-shadow shadow-orange-100 space-y-3 animate-slide-up">
                    <p class="text-xs font-bold uppercase tracking-widest text-orange-200" id="detail-label">Select a node</p>
                    <h5 class="text-base font-extrabold leading-snug" id="detail-name">—</h5>
                    <div class="flex items-center gap-2">
                        <span class="text-2xl font-extrabold" id="detail-count">—</span>
                        <span class="text-orange-200 text-sm font-semibold" id="detail-count-label">papers</span>
                    </div>
                    <p class="text-orange-100 text-xs leading-relaxed" id="detail-summary"></p>
                    <div id="detail-keywords" class="hidden flex-wrap gap-1"></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 space-y-3">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Type Filter</p>
                    <div id="tree-type-filter" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 space-y-3">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Legend</p>
                    <div class="space-y-2.5">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full bg-orange-500 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Root</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full bg-white border-2 border-slate-400 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Research Type</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full bg-white border-2 border-orange-400 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Group</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-2.5 h-2.5 rounded-full bg-orange-100 border border-orange-300 flex-shrink-0 ml-0.5"></div>
                            <span class="text-xs font-semibold text-slate-600">Paper</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-2.5 h-2.5 rounded-full bg-violet-100 border border-violet-400 flex-shrink-0 ml-0.5"></div>
                            <span class="text-xs font-semibold text-slate-600">Duplicate paper</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <svg width="20" height="10" class="flex-shrink-0 ml-0.5"><line x1="0" y1="5" x2="20" y2="5" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,4"/></svg>
                            <span class="text-xs font-semibold text-slate-600">Duplicate link</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-center text-xs text-slate-300 italic">Drag to pan, scroll to zoom. Click nodes for details.</p>

        <div id="level-list" class="space-y-6 pb-8"></div>
    </div>

    <script>
        /**
         * DATA_INJECTION_POINT_START
         */
        const toolTreeData = {};
        const techniqueTreeData = {};
        /**
         * DATA_INJECTION_POINT_END
         */

        const TYPE_CONFIG = {
            Method:     { fill: '#dbeafe', stroke: '#3b82f6', pill: 'bg-blue-50 text-blue-500 border-blue-200' },
            Empirical:  { fill: '#dcfce7', stroke: '#22c55e', pill: 'bg-green-50 text-green-600 border-green-200' },
            Qualitative:{ fill: '#f3e8ff', stroke: '#a855f7', pill: 'bg-purple-50 text-purple-500 border-purple-200' },
            Benchmark:  { fill: '#fef9c3', stroke: '#eab308', pill: 'bg-yellow-50 text-yellow-600 border-yellow-200' },
            Survey:     { fill: '#f1f5f9', stroke: '#64748b', pill: 'bg-slate-100 text-slate-500 border-slate-200' },
        };
        const ALL_TYPES = Object.keys(TYPE_CONFIG);
        let treeActiveTypes = new Set(ALL_TYPES);

        // Type filter UI
        (function initTypeFilter() {
            const el = document.getElementById('tree-type-filter');
            ALL_TYPES.forEach(type => {
                const btn = document.createElement('button');
                btn.dataset.type = type;
                btn.className = `text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full border transition-all ${TYPE_CONFIG[type].pill}`;
                btn.textContent = type;
                btn.onclick = () => {
                    if (treeActiveTypes.has(type)) treeActiveTypes.delete(type);
                    else treeActiveTypes.add(type);
                    if (treeActiveTypes.size === 0) treeActiveTypes = new Set(ALL_TYPES);
                    el.querySelectorAll('button').forEach(b => {
                        b.style.opacity = treeActiveTypes.has(b.dataset.type) ? '1' : '0.3';
                    });
                    applyTypeFilter();
                };
                el.appendChild(btn);
            });
        })();

        function countLeaves(node) {
            if (!node.children || !node.children.length) return node.is_paper ? 1 : 0;
            return node.children.reduce((s, c) => s + countLeaves(c), 0);
        }
        function filterTreeData(node, types, isRoot) {
            if (!node) return null;
            if (node.is_paper) {
                return types.has(node.research_type || 'Method') ? node : null;
            }
            const filteredChildren = (node.children || [])
                .map(c => filterTreeData(c, types, false))
                .filter(Boolean);
            if (!isRoot && filteredChildren.length === 0) return null;
            const filtered = { ...node, children: filteredChildren };
            filtered.count = countLeaves(filtered);
            return filtered;
        }

        let currentRawData = null;
        let currentSelectedNodeName = null;

        function findNodeByName(node, name) {
            if (!node) return null;
            if (node.name === name) return node;
            for (const c of (node.children || [])) {
                const found = findNodeByName(c, name);
                if (found) return found;
            }
            return null;
        }

        function applyTypeFilter() {
            if (!currentRawData) return;
            const filtered = filterTreeData(currentRawData, treeActiveTypes, true);
            renderTree(filtered, true);
            if (currentSelectedNodeName) {
                const match = findNodeByName(filtered, currentSelectedNodeName);
                if (match) showDetail(match);
            }
        }

        const svgEl = document.getElementById('tree-svg');
        const container = document.getElementById('tree-container');

        function maxLeaves(d) { if (!d || !d.children || !d.children.length) return 1; return d.children.reduce((s, c) => s + maxLeaves(c), 0); }
        function calcCanvasSize(data) {
            const lc = Math.max(maxLeaves(data), 1);
            const r = Math.max(180, Math.ceil((lc * 32) / (2 * Math.PI)));
            return 2 * (r + 120);
        }

        function getSvgSize() {
            const w = svgEl.getBoundingClientRect().width || svgEl.clientWidth || container.clientWidth || window.innerWidth - 32;
            const h = parseFloat(svgEl.getAttribute('height')) || 500;
            return [w, h];
        }

        function updateHeight() {
            const h = Math.max(350, Math.min(window.innerHeight - 150, 700));
            svgEl.setAttribute('height', h);
        }
        updateHeight();

        const svg = d3.select('#tree-svg');
        const zoomGroup = svg.append('g');
        const zoom = d3.zoom().scaleExtent([0.1, 6]).on('zoom', e => zoomGroup.attr('transform', e.transform));
        svg.call(zoom);

        function fitView() {
            const bbox = zoomGroup.node().getBBox();
            if (!bbox.width || !bbox.height) return;
            const [w, h] = getSvgSize();
            const pad = 40;
            const scale = Math.min(w / (bbox.width + pad * 2), h / (bbox.height + pad * 2), 1.5);
            const tx = w / 2 - (bbox.x + bbox.width / 2) * scale;
            const ty = h / 2 - (bbox.y + bbox.height / 2) * scale;
            svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }

        new ResizeObserver(() => { updateHeight(); requestAnimationFrame(fitView); }).observe(container);

        function switchTab(type) {
            document.getElementById('tab-tool').classList.toggle('tab-active', type === 'tool');
            document.getElementById('tab-technique').classList.toggle('tab-active', type === 'technique');
            document.getElementById('tab-tool').classList.toggle('text-slate-400', type !== 'tool');
            document.getElementById('tab-technique').classList.toggle('text-slate-400', type !== 'technique');
            const raw = type === 'tool' ? toolTreeData : techniqueTreeData;
            currentRawData = raw;
            renderTree(filterTreeData(raw, treeActiveTypes, true), true);
        }

        let _nodeRadiusRoot = 28, _nodeRadiusCluster = 20, _nodeRadiusLeaf = 6;
        function nodeRadius(d) {
            if (d.depth === 0) return _nodeRadiusRoot;
            if (d.data.is_paper) return _nodeRadiusLeaf;
            return _nodeRadiusCluster;
        }

        function toXY(d) { return [d.y * Math.sin(d.x), -d.y * Math.cos(d.x)]; }

        function renderTree(data, skipDataStore) {
            if (!skipDataStore) currentRawData = data;
            zoomGroup.selectAll('*').remove();
            svg.call(zoom.transform, d3.zoomIdentity);
            if (!data) return;
            const hasChildren = data.children?.length > 0;

            document.getElementById('total-count').innerText = data.count ?? '—';

            const root = d3.hierarchy(data);
            const maxDepth = d3.max(root.descendants(), d => d.depth) || 1;
            const GAP = 10;
            const MARGIN = 1.5;
            const LEAF_MARGIN = 1.0;

            function assignSectors(node, start, end) {
                node._start = start;
                node._end = end;
                node.x = (start + end) / 2;
                if (!node.children || !node.children.length) return;
                const step = (end - start) / node.children.length;
                node.children.forEach((c, i) => assignSectors(c, start + i * step, start + (i + 1) * step));
            }
            assignSectors(root, 0, 2 * Math.PI);

            const minRByDepth = new Array(maxDepth + 1).fill(0);
            root.each(d => {
                if (d.depth === 0) return;
                const w = d._end - d._start;
                const sinHalf = Math.sin(w / 2);
                const need = (2 * nodeRadius(d) + GAP) * MARGIN;
                const minR = sinHalf < 1e-9 ? need / Math.max(w, 1e-9) : need / (2 * sinHalf);
                if (minR > minRByDepth[d.depth]) minRByDepth[d.depth] = minR;
            });

            const leaves = root.leaves();
            const leafNodeR = 6;
            const leafStep = (2 * Math.PI) / Math.max(leaves.length, 1);
            const sinLeafHalf = Math.sin(leafStep / 2);
            const leafMinR = sinLeafHalf < 1e-9
                ? (2 * leafNodeR + GAP) * LEAF_MARGIN / Math.max(leafStep, 1e-9)
                : (2 * leafNodeR + GAP) * LEAF_MARGIN / (2 * sinLeafHalf);
            if (leafMinR > minRByDepth[maxDepth]) minRByDepth[maxDepth] = leafMinR;

            for (let i = 1; i <= maxDepth; i++) {
                minRByDepth[i] = Math.max(minRByDepth[i], minRByDepth[i - 1] + GAP);
            }

            const rawGaps = [];
            for (let i = 1; i <= maxDepth; i++) rawGaps.push(minRByDepth[i] - minRByDepth[i - 1]);
            const uniformGap = Math.max(...rawGaps);
            const uniformR = new Array(maxDepth + 1).fill(0);
            for (let i = 1; i <= maxDepth; i++) uniformR[i] = uniformGap * i;

            const canvasSize = calcCanvasSize(data);
            const radius = canvasSize / 2 - 15;

            const sizeScale = Math.sqrt(canvasSize / 600);
            _nodeRadiusRoot    = Math.round(28 * sizeScale);
            _nodeRadiusCluster = Math.round(20 * sizeScale);
            _nodeRadiusLeaf    = 6;
            const fontRoot    = Math.round(11 * sizeScale * 1.4);
            const fontCluster = Math.round(10 * sizeScale * 1.4);
            const cx = canvasSize / 2, cy = canvasSize / 2;
            const g = zoomGroup.append('g').attr('transform', `translate(${cx},${cy})`);

            if (!hasChildren) {
                g.append('circle').attr('r', 28).attr('fill', '#f97316');
                g.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                    .attr('font-size', '11px').attr('font-weight', '800').attr('fill', '#fff')
                    .text(data.count ?? '');
                requestAnimationFrame(fitView);
                return;
            }

            const rScale = uniformR[maxDepth] > radius ? radius / uniformR[maxDepth] : 1;
            root.each(d => { d.y = d.depth === 0 ? 0 : uniformR[d.depth] * rScale; });

            // Duplicate paper detection
            const allPaperNodes = root.descendants().filter(d => d.data.is_paper && d.data.filename);
            const byFilename = d3.group(allPaperNodes, d => d.data.filename);
            const dupFilenames = new Set();
            byFilename.forEach((nodes, fn) => { if (nodes.length > 1) dupFilenames.add(fn); });

            // Links
            g.append('g')
                .selectAll('path').data(root.links()).join('path')
                .attr('class', 'link')
                .attr('d', d => {
                    const [px, py] = toXY(d.source);
                    const [cx2, cy2] = toXY(d.target);
                    return `M${px.toFixed(1)},${py.toFixed(1)} L${cx2.toFixed(1)},${cy2.toFixed(1)}`;
                });

            // Duplicate links
            const maxLeafR = d3.max(root.descendants(), d => d.y) || radius;
            const baseOuterR = maxLeafR + 50;
            const dupLayer = g.append('g').attr('class', 'dup-links');
            const dupLinksByFile = new Map();
            const dupFilenameList = [...byFilename.entries()].filter(([,n]) => n.length >= 2).map(([f]) => f);
            dupFilenameList.forEach((filename, fileIdx) => {
                const nodes = byFilename.get(filename);
                const outerR = baseOuterR + fileIdx * 18;
                const links = [];
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const [ax, ay] = toXY(nodes[i]);
                        const [bx, by] = toXY(nodes[j]);
                        const rA = Math.sqrt(ax*ax + ay*ay) || 1;
                        const rB = Math.sqrt(bx*bx + by*by) || 1;
                        const oAx = (outerR * ax / rA).toFixed(1), oAy = (outerR * ay / rA).toFixed(1);
                        const oBx = (outerR * bx / rB).toFixed(1), oBy = (outerR * by / rB).toFixed(1);
                        let da = nodes[j].x - nodes[i].x;
                        while (da > Math.PI) da -= 2 * Math.PI;
                        while (da < -Math.PI) da += 2 * Math.PI;
                        const sweep = da >= 0 ? 1 : 0;
                        const pathD = `M${ax.toFixed(1)},${ay.toFixed(1)} L${oAx},${oAy} A${outerR},${outerR} 0 0 ${sweep} ${oBx},${oBy} L${bx.toFixed(1)},${by.toFixed(1)}`;
                        links.push(dupLayer.append('path').attr('class', 'dup-link').attr('d', pathD));
                    }
                }
                dupLinksByFile.set(filename, links);
            });

            // Nodes
            const node = g.append('g')
                .selectAll('g').data(root.descendants()).join('g')
                .attr('class', 'node')
                .attr('transform', d => {
                    const [x, y] = toXY(d);
                    return `translate(${x},${y})`;
                })
                .on('mouseover', function(_, d) {
                    d3.select(this).select('circle').attr('r', nodeRadius(d) * 1.4);
                    showDetail(d.data);
                    if (d.data.is_paper && dupFilenames.has(d.data.filename)) {
                        (dupLinksByFile.get(d.data.filename) || []).forEach(l => l.classed('highlighted', true));
                        node.filter(n => n !== d && n.data.filename === d.data.filename)
                            .select('circle').attr('r', nodeRadius(d) * 1.4);
                    }
                })
                .on('mouseout', function(_, d) {
                    d3.select(this).select('circle').attr('r', nodeRadius(d));
                    if (d.data.is_paper && dupFilenames.has(d.data.filename)) {
                        (dupLinksByFile.get(d.data.filename) || []).forEach(l => l.classed('highlighted', false));
                        node.filter(n => n !== d && n.data.filename === d.data.filename)
                            .select('circle').attr('r', nodeRadius(d));
                    }
                });

            // Circles
            node.append('circle')
                .attr('r', nodeRadius)
                .attr('fill', d => {
                    if (d.depth === 0) return '#f97316';
                    if (d.data.is_paper) {
                        const cfg = TYPE_CONFIG[d.data.research_type] || TYPE_CONFIG['Method'];
                        return cfg.fill;
                    }
                    if (d.depth === 1) return '#ffffff'; // research_type level
                    return '#ffffff'; // group level
                })
                .attr('stroke', d => {
                    if (d.depth === 0) return 'none';
                    if (d.data.is_paper) {
                        const cfg = TYPE_CONFIG[d.data.research_type] || TYPE_CONFIG['Method'];
                        return cfg.stroke;
                    }
                    if (d.depth === 1) return '#94a3b8'; // research_type: slate
                    return '#f97316'; // group: orange
                })
                .attr('stroke-width', d => d.depth === 0 ? 0 : 1.5);

            // Root label
            node.filter(d => d.depth === 0).append('text')
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', `${fontRoot}px`).attr('font-weight', '800').attr('fill', '#fff')
                .attr('pointer-events', 'none')
                .text(d => d.data.count ?? '');

            // Cluster/type labels
            node.filter(d => d.depth > 0 && !d.data.is_paper).append('text')
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', `${fontCluster}px`).attr('font-weight', '700')
                .attr('fill', d => d.depth === 1 ? '#64748b' : '#f97316')
                .attr('pointer-events', 'none')
                .text(d => d.data.count);

            // Click handler
            node.filter(d => d.depth > 0).style('cursor', 'pointer')
                .on('click', function(event, d) {
                    event.stopPropagation();
                    showDetail(d.data);
                    scrollToDetail();
                });

            // Level list
            const levelList = document.getElementById('level-list');
            levelList.innerHTML = '';

            const levels = d3.groups(
                root.descendants().filter(d => d.depth > 0 && !d.data.is_paper),
                d => d.depth
            ).sort((a, b) => a[0] - b[0]);

            const depthLabels = { 1: 'Research Type', 2: 'Group' };
            levels.forEach(([depth, nodes]) => {
                const section = document.createElement('div');
                section.className = 'bg-white rounded-[2rem] card-shadow border border-slate-100 p-6 space-y-4';
                section.innerHTML = `<p class="text-xs font-black text-orange-500 uppercase tracking-widest">${depthLabels[depth] || 'Depth ' + depth} — ${nodes.length} items</p>`;

                const byParent = d3.groups(nodes, n => n.parent?.data?.name || 'Root');
                byParent.forEach(([parentName, children]) => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'space-y-2';
                    if (byParent.length > 1) {
                        const parentLabel = document.createElement('p');
                        parentLabel.className = 'text-xs font-bold text-slate-400 pl-1';
                        parentLabel.textContent = '\u25b8 ' + parentName;
                        groupDiv.appendChild(parentLabel);
                    }
                    const list = document.createElement('div');
                    list.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2';
                    children.forEach(n => {
                        const item = document.createElement('button');
                        item.className = 'text-left p-3 rounded-xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50 transition-all group';
                        item.innerHTML = `
                            <p class="text-sm font-bold text-slate-700 group-hover:text-orange-600 leading-snug">${n.data.name}</p>
                            <p class="text-xs text-orange-500 mt-0.5 font-semibold">${n.data.count} papers</p>`;
                        item.onclick = () => { showDetail(n.data); scrollToDetail(); };
                        list.appendChild(item);
                    });
                    groupDiv.appendChild(list);
                    section.appendChild(groupDiv);
                });
                levelList.appendChild(section);
            });

            // Paper list
            const papers = root.descendants().filter(d => d.data.is_paper);
            if (papers.length) {
                const section = document.createElement('div');
                section.className = 'bg-white rounded-[2rem] card-shadow border border-slate-100 p-6 space-y-4';
                const typeCounts = {};
                papers.forEach(n => { const t = n.data.research_type || ''; typeCounts[t] = (typeCounts[t] || 0) + 1; });
                const typeBadges = Object.entries(typeCounts).map(([t, cnt]) => {
                    const cfg = TYPE_CONFIG[t];
                    return cfg
                        ? `<span class="text-[9px] font-bold uppercase tracking-widest px-1.5 py-0.5 rounded-full border ${cfg.pill}">${t} ${cnt}</span>`
                        : `<span class="text-[9px] font-bold uppercase tracking-widest px-1.5 py-0.5 rounded-full border bg-slate-100 text-slate-400 border-slate-200">${cnt}</span>`;
                }).join('');
                section.innerHTML = `<div class="flex items-center gap-2 flex-wrap"><p class="text-xs font-black text-orange-500 uppercase tracking-widest">Papers — ${papers.length} total</p>${typeBadges}</div>`;

                const byParent = d3.groups(papers, n => n.parent?.data?.name || 'Root');
                byParent.forEach(([parentName, children]) => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'space-y-2';
                    const parentLabel = document.createElement('p');
                    parentLabel.className = 'text-xs font-bold text-slate-400 pl-1';
                    parentLabel.textContent = '\u25b8 ' + parentName;
                    groupDiv.appendChild(parentLabel);
                    const list = document.createElement('div');
                    list.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2';
                    children.forEach(n => {
                        const item = document.createElement('button');
                        item.className = 'text-left p-3 rounded-xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50 transition-all group';
                        const rtCfg = TYPE_CONFIG[n.data.research_type];
                        const badgeCls = rtCfg ? rtCfg.pill : 'bg-slate-100 text-slate-400 border-slate-200';
                        const kwHtml = (n.data.keywords && n.data.keywords.length)
                            ? `<div class="flex flex-wrap gap-1 mt-1.5">${n.data.keywords.map(k => `<span class="text-[8px] font-semibold px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 border border-slate-200">${k}</span>`).join('')}</div>`
                            : '';
                        item.innerHTML = `
                            <p class="text-sm font-bold text-slate-700 group-hover:text-orange-600 leading-snug">${n.data.name}</p>
                            <p class="text-xs text-slate-400 mt-0.5 mb-1.5">${n.data.filename || ''}</p>
                            <span class="text-[9px] font-bold uppercase tracking-widest px-1.5 py-0.5 rounded-full border ${badgeCls}">${n.data.research_type || '—'}</span>${kwHtml}`;
                        item.onclick = () => { showDetail(n.data); scrollToDetail(); };
                        list.appendChild(item);
                    });
                    groupDiv.appendChild(list);
                    section.appendChild(groupDiv);
                });
                levelList.appendChild(section);
            }

            requestAnimationFrame(fitView);
        }

        function showDetail(data) {
            currentSelectedNodeName = data.name;
            document.getElementById('detail-name').innerText = data.name;
            if (data.is_paper) {
                document.getElementById('detail-label').textContent = data.research_type || 'Paper';
                document.getElementById('detail-count').innerText = '';
                document.getElementById('detail-count-label').innerHTML = `<span style="font-size:10px;opacity:.7;">${data.filename || ''}</span>`;
            } else {
                document.getElementById('detail-label').textContent = data.is_type ? 'Research Type' : 'Group';
                document.getElementById('detail-count').innerText = data.count ?? '—';
                document.getElementById('detail-count-label').innerText = 'papers';
            }
            document.getElementById('detail-summary').innerText = data.is_paper ? '' : (data.summary || '');
            const kwEl = document.getElementById('detail-keywords');
            if (data.keywords?.length) {
                kwEl.innerHTML = data.keywords.map(k =>
                    `<span style="display:inline-block;margin:2px 2px 0 0;padding:1px 7px;background:rgba(255,255,255,0.18);border-radius:999px;font-size:10px;font-weight:600;color:#fff;">${k}</span>`
                ).join('');
                kwEl.classList.remove('hidden');
                kwEl.style.display = 'flex';
            } else {
                kwEl.classList.add('hidden');
                kwEl.style.display = '';
            }
            const card = document.getElementById('detail-card');
            card.classList.remove('animate-slide-up');
            void card.offsetWidth;
            card.classList.add('animate-slide-up');
        }

        function scrollToDetail() {
            document.getElementById('detail-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        currentRawData = toolTreeData;
        renderTree(filterTreeData(toolTreeData, treeActiveTypes, true), true);
    </script>
</body>
</html>
