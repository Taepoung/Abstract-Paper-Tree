<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Insights Chart Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .accent-gradient {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        .tab-active {
            color: #f97316;
            border-bottom: 3px solid #f97316;
            font-weight: 800;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-7xl mx-auto space-y-12">
        <!-- Header & Nav -->
        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-8 border-b border-slate-200 pb-8">
            <div class="space-y-2">
                <div id="back-nav" class="hidden">
                    <a id="back-link" href="#"
                        class="inline-flex items-center gap-1.5 text-slate-400 hover:text-orange-500 transition-colors text-sm font-semibold">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                        </svg>
                        상위 클러스터로
                    </a>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-3">
                    <span class="w-10 h-10 accent-gradient rounded-xl shadow-lg shadow-orange-200"></span>
                    <span id="page-title-text">Interactive Research Map</span>
                </h1>
                <p class="text-slate-400 font-medium tracking-tight">Clustered Academic Insights & Trend Analytics</p>
            </div>
            <div class="flex items-center gap-4">
            <a id="tree-link" href="tree.html" class="inline-flex items-center gap-2 px-5 py-3 bg-white border border-slate-100 rounded-2xl text-sm font-bold text-slate-400 hover:text-orange-500 hover:border-orange-200 transition-all card-shadow">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Tree View
            </a>
            <nav id="cluster-tabs" class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchTab('problem')" id="tab-problem"
                    class="px-8 py-3 rounded-xl text-sm font-bold transition-all tab-active">Problem Clusters</button>
                <button onclick="switchTab('methodology')" id="tab-methodology"
                    class="px-8 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Methodology
                    Clusters</button>
            </nav>
            </div>
        </header>

        <!-- Main Visualization Section -->
        <main id="cluster-distribution" class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <!-- Chart Side -->
            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 space-y-6">
                <div class="flex items-center justify-between flex-wrap gap-3">
                    <h3 class="text-xl font-bold text-slate-800">Cluster Distribution</h3>
                    <div class="flex flex-wrap gap-1.5" id="type-filter-btns"></div>
                </div>
                <div class="relative" id="chart-container">
                    <canvas id="insightChart"></canvas>
                </div>
                <p class="text-xs text-slate-400 italic text-center">※ 바를 클릭하여 해당 클러스터의 상세 논문 리스트를 확인하세요.</p>
            </div>

            <!-- Summary Side -->
            <div class="space-y-6">
                <div
                    class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 flex flex-col items-center text-center space-y-4">
                    <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h4 class="text-3xl font-extrabold text-slate-900" id="total-papers-counter">0</h4>
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Papers Analyzed</p>
                    </div>
                </div>

                <div id="cluster-summary-card"
                    class="bg-gradient-to-br from-orange-500 to-orange-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-orange-100 space-y-4 animate-slide-up">
                    <h5 class="text-lg font-extrabold" id="selected-cluster-name">Cluster Details</h5>
                    <p class="text-orange-50 text-sm leading-relaxed" id="selected-cluster-summary">차트의 막대를 클릭하면 해당 영역의
                        핵심 요약이 여기에 표시됩니다.</p>
                    <div id="sub-cluster-link"></div>
                </div>
            </div>
        </main>

        <!-- Detailed Paper List (Drill-down) -->
        <section id="detail-section" class="space-y-8 pb-20">
            <div class="flex items-center gap-4 px-4">
                <h3 class="text-2xl font-bold text-slate-800" id="papers-section-title">All Papers</h3>
                <div class="h-1 flex-grow bg-slate-100 rounded-full"></div>
                <button id="show-all-btn" onclick="showAllPapers()" class="hidden text-xs font-bold text-orange-500 bg-orange-50 hover:bg-orange-100 px-3 py-1.5 rounded-full transition-colors">전체 보기 ✕</button>
            </div>

            <div id="paper-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
        </section>
    </div>

    <!-- Data Injection & Logic -->
    <script>
        /**
         * DATA_INJECTION_POINT_START
         */
        const researchResults = [];
        const problemGroups = {};
        const methodologyGroups = {};
        const parentUrl = null;
        const pageTitle = "";
        const treeUrl = "tree.html";
        /**
         * DATA_INJECTION_POINT_END
         */

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        const TYPE_CONFIG = {  // fill/stroke는 트리와 공용, pill은 대시보드 Tailwind 클래스
            Method:     { color: 'rgba(59,130,246,0.85)',  border: '#3b82f6', fill: '#dbeafe', stroke: '#3b82f6', pill: 'bg-blue-50 text-blue-500 border-blue-200' },
            Empirical:  { color: 'rgba(34,197,94,0.85)',   border: '#22c55e', pill: 'bg-green-50 text-green-600 border-green-200' },
            Qualitative:{ color: 'rgba(168,85,247,0.85)',  border: '#a855f7', pill: 'bg-purple-50 text-purple-500 border-purple-200' },
            Benchmark:  { color: 'rgba(234,179,8,0.85)',   border: '#eab308', pill: 'bg-yellow-50 text-yellow-600 border-yellow-200' },
            Survey:     { color: 'rgba(100,116,139,0.85)', border: '#64748b', pill: 'bg-slate-100 text-slate-500 border-slate-200' },
        };
        const ALL_TYPES = Object.keys(TYPE_CONFIG);

        let myChart = null;
        let currentTab = 'problem';
        let activeTypes = new Set(ALL_TYPES); // 빈 Set = 전체

        function initNavigation() {
            if (parentUrl) {
                document.getElementById('back-nav').classList.remove('hidden');
                document.getElementById('back-link').href = parentUrl;
                document.getElementById('cluster-tabs').classList.add('hidden');
            }
            if (pageTitle) {
                document.getElementById('page-title-text').innerText = pageTitle;
                document.title = pageTitle + ' — Research Map';
            }
            if (treeUrl) {
                document.getElementById('tree-link').href = treeUrl;
            }
        }

        function initDashboard() {
            document.getElementById('total-papers-counter').innerText = researchResults.length;
            initNavigation();
            renderTypeFilters();
            renderChart();
            showAllPapers();
        }

        function renderTypeFilters() {
            const container = document.getElementById('type-filter-btns');
            container.innerHTML = '';
            ALL_TYPES.forEach(type => {
                const btn = document.createElement('button');
                const cfg = TYPE_CONFIG[type];
                btn.dataset.type = type;
                btn.className = `text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full border transition-all ${cfg.pill} opacity-100`;
                btn.textContent = type;
                btn.onclick = () => toggleTypeFilter(type);
                container.appendChild(btn);
            });
        }

        function toggleTypeFilter(type) {
            if (activeTypes.has(type)) {
                activeTypes.delete(type);
            } else {
                activeTypes.add(type);
            }
            // 아무것도 선택 안 된 경우 전체 선택으로
            if (activeTypes.size === 0) activeTypes = new Set(ALL_TYPES);
            // 버튼 스타일 갱신
            document.querySelectorAll('#type-filter-btns button').forEach(btn => {
                const active = activeTypes.has(btn.dataset.type);
                btn.style.opacity = active ? '1' : '0.3';
            });
            renderChart();
            // 필터된 논문 수 업데이트
            const filteredTotal = researchResults.filter(p => activeTypes.has(p.research_type || 'Method')).length;
            document.getElementById('total-papers-counter').innerText = filteredTotal;
            // 현재 표시 중인 목록도 갱신
            const titleEl = document.getElementById('papers-section-title');
            if (titleEl.innerText === 'All Papers') showAllPapers();
            else showClusterPapers(titleEl.innerText);
        }

        function switchTab(type) {
            currentTab = type;
            document.getElementById('tab-problem').classList.toggle('tab-active', type === 'problem');
            document.getElementById('tab-methodology').classList.toggle('tab-active', type === 'methodology');

            const inactiveId = type === 'problem' ? 'tab-methodology' : 'tab-problem';
            document.getElementById(inactiveId).classList.add('text-slate-400');
            document.getElementById(inactiveId).classList.remove('text-slate-900');

            renderChart();
            const filteredTotal = researchResults.filter(p => activeTypes.has(p.research_type || 'Method')).length;
            document.getElementById('total-papers-counter').innerText = filteredTotal;
            showAllPapers();
        }

        function renderChart() {
            const ctx = document.getElementById('insightChart').getContext('2d');
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const labels = Object.keys(groups);

            const chartH = Math.max(250, labels.length * 50);
            document.getElementById('chart-container').style.height = chartH + 'px';

            if (myChart) myChart.destroy();

            // 활성 타입별 stacked dataset
            const datasets = ALL_TYPES.filter(t => activeTypes.has(t)).map(type => ({
                label: type,
                data: labels.map(label =>
                    groups[label].papers.filter(p => (p.research_type || 'Method') === type).length
                ),
                backgroundColor: TYPE_CONFIG[type].color,
                borderColor: TYPE_CONFIG[type].border,
                borderWidth: 0,
                borderRadius: 6,
                barThickness: 28,
            }));

            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11, weight: 'bold' } } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 13, weight: 'bold' },
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { stepSize: 1, font: { weight: 'bold' } } },
                        y: {
                            stacked: true,
                            grid: { borderDash: [5, 5], color: '#e2e8f0' },
                            ticks: {
                                font: { size: 12, weight: '600' },
                                color: '#64748b',
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);
                                    return label.length > 22 ? label.substr(0, 22) + '…' : label;
                                }
                            }
                        }
                    },
                    onClick: (evt, activeElements) => {
                        if (activeElements.length > 0) {
                            const index = activeElements[0].index;
                            const clusterName = labels[index];
                            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
                            const cluster = groups[clusterName];
                            // 사이드 요약 카드만 업데이트, 스크롤 이동 없음
                            document.getElementById('selected-cluster-name').innerText = clusterName;
                            document.getElementById('selected-cluster-summary').innerText = cluster?.summary || '';
                            const subLinkEl = document.getElementById('sub-cluster-link');
                            if (cluster?.sub_page_url) {
                                subLinkEl.innerHTML = `<a href="${cluster.sub_page_url}" class="inline-flex items-center gap-2 text-white/80 hover:text-white text-sm font-bold transition-colors border border-white/30 hover:border-white/60 rounded-xl px-4 py-2 hover:bg-white/10">세부 클러스터 보기 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg></a>`;
                            } else { subLinkEl.innerHTML = ''; }
                        }
                    }
                }
            });
        }

        function buildPaperCard(paper) {
            const card = document.createElement('div');
            card.className = 'bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 space-y-4 animate-slide-up hover:border-orange-200 transition-colors cursor-default';
            card.innerHTML = `
                <div class="flex items-start justify-between gap-2">
                    <div class="space-y-1 flex-1 min-w-0">
                        <span class="text-[10px] font-bold text-orange-400 uppercase tracking-widest bg-orange-50 px-2 py-0.5 rounded-md">${escapeHTML(paper.filename)}</span>
                        <h6 class="text-xl font-bold text-slate-800 leading-tight pt-1">${escapeHTML(paper.title)}</h6>
                    </div>
                    <span class="flex-shrink-0 text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-md border ${TYPE_CONFIG[paper.research_type]?.pill || 'bg-slate-100 text-slate-400 border-slate-200'}">${escapeHTML(paper.research_type || '—')}</span>
                </div>
                <div class="space-y-4 pt-2">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Research Problem (해결하려는 문제)</p>
                        <p class="text-sm text-slate-600 leading-relaxed">${escapeHTML(paper.problem)}</p>
                    </div>
                    <div class="bg-orange-50/50 p-4 rounded-2xl">
                        <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1 italic">Key Methodology (해결 방법)</p>
                        <p class="text-sm text-slate-700 leading-relaxed font-medium">${escapeHTML(paper.methodology)}</p>
                    </div>
                    ${paper.keywords?.length ? `
                    <div class="flex flex-wrap gap-1.5 pt-1">
                        ${paper.keywords.map(k => `<span class="text-[10px] font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">${escapeHTML(k)}</span>`).join('')}
                    </div>` : ''}
                </div>
            `;
            return card;
        }

        function filteredPapers(papers) {
            return papers.filter(p => activeTypes.has(p.research_type || 'Method'));
        }

        function showAllPapers() {
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const container = document.getElementById('paper-list-container');
            container.innerHTML = '';
            document.getElementById('papers-section-title').innerText = 'All Papers';
            document.getElementById('show-all-btn').classList.add('hidden');

            for (const [clusterName, cluster] of Object.entries(groups)) {
                const papers = filteredPapers(cluster.papers);
                if (!papers.length) continue;
                const heading = document.createElement('div');
                heading.id = 'cluster-' + clusterName.replace(/\s+/g, '-');
                heading.className = 'md:col-span-2 flex items-center gap-4 pt-4';
                heading.innerHTML = `
                    <h4 class="text-lg font-extrabold text-slate-700 flex-shrink-0">${escapeHTML(clusterName)}</h4>
                    <div class="h-0.5 flex-grow bg-orange-100 rounded-full"></div>
                    <span class="text-xs font-bold text-orange-400 bg-orange-50 px-2 py-1 rounded-lg flex-shrink-0">${papers.length} papers</span>
                `;
                container.appendChild(heading);
                papers.forEach(paper => container.appendChild(buildPaperCard(paper)));
            }

            document.getElementById('selected-cluster-name').innerText = 'Cluster Details';
            document.getElementById('selected-cluster-summary').innerText = '차트의 막대를 클릭하면 해당 영역의 핵심 요약이 여기에 표시됩니다.';
            document.getElementById('sub-cluster-link').innerHTML = '';
        }

        function showClusterPapers(clusterName) {
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const cluster = groups[clusterName];
            if (!cluster) return;

            const papers = filteredPapers(cluster.papers);
            const container = document.getElementById('paper-list-container');
            container.innerHTML = '';
            document.getElementById('papers-section-title').innerText = clusterName;
            document.getElementById('show-all-btn').classList.remove('hidden');

            papers.forEach(paper => container.appendChild(buildPaperCard(paper)));

            document.getElementById('detail-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateDetailView(clusterName) {
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const cluster = groups[clusterName];

            document.getElementById('selected-cluster-name').innerText = clusterName;
            document.getElementById('selected-cluster-summary').innerText = cluster.summary || "이 연구 영역에 속한 논문들의 흐름입니다.";

            const subLinkEl = document.getElementById('sub-cluster-link');
            if (cluster.sub_page_url) {
                subLinkEl.innerHTML = `<a href="${cluster.sub_page_url}" class="inline-flex items-center gap-2 text-white/80 hover:text-white text-sm font-bold transition-colors border border-white/30 hover:border-white/60 rounded-xl px-4 py-2 hover:bg-white/10">세부 클러스터 보기 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg></a>`;
            } else {
                subLinkEl.innerHTML = '';
            }

            showClusterPapers(clusterName);
        }

        // Initialize display
        if (researchResults.length > 0) {
            initDashboard();
        } else {
            console.warn("No data injected into data points.");
        }
    </script>
</body>

</html>
