<!DOCTYPE html>

<head>

        }

        .accent-gradient {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {

        }

            return div.innerHTML;
        }

        let myChart = null;
        let currentTab = 'problem';

        function initNavigation() {
            if (parentUrl) {
                document.getElementById('back-nav').classList.remove('hidden');
                document.getElementById('back-link').href = parentUrl;
            }
            if (pageTitle) {
                document.getElementById('page-title-text').innerText = pageTitle;
                document.title = pageTitle + ' — Research Map';
            }
        }

        function initDashboard() {
            document.getElementById('total-papers-counter').innerText = researchResults.length;
            initNavigation();
            renderChart();

            // Default select the first cluster if exists
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const groupNames = Object.keys(groups);
            if (groupNames.length > 0) {
                updateDetailView(groupNames[0]);
            }
        }

        function switchTab(type) {
            currentTab = type;
            document.getElementById('tab-problem').classList.toggle('tab-active', type === 'problem');
            document.getElementById('tab-methodology').classList.toggle('tab-active', type === 'methodology');

            // Style update for inactive tab
            const inactiveId = type === 'problem' ? 'tab-methodology' : 'tab-problem';
            document.getElementById(inactiveId).classList.add('text-slate-400');
            document.getElementById(inactiveId).classList.remove('text-slate-900');

            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('insightChart').getContext('2d');
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const labels = Object.keys(groups);
            const dataCounts = labels.map(label => groups[label].papers.length);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Papers',
                        data: dataCounts,
                        backgroundColor: 'rgba(249, 115, 22, 0.8)',
                        hoverBackgroundColor: '#f97316',
                        borderRadius: 12,
                        barThickness: 32
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y', // Horizontal bars for better readability
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { stepSize: 1, font: { weight: 'bold' } }
                        },
                        y: {
                            grid: { borderDash: [5, 5], color: '#e2e8f0' },
                            ticks: {
                                font: { size: 12, weight: '600' },
                                color: '#64748b',
                                callback: function (value) {
                                    const label = this.getLabelForValue(value);
                                    return label.length > 20 ? label.substr(0, 20) + '...' : label;
                                }
                            }
                        }
                    },
                    onClick: (evt, activeElements) => {
                        if (activeElements.length > 0) {
                            const index = activeElements[0].index;
                            const clusterName = labels[index];
                            updateDetailView(clusterName);
                        }
                    }
                }
            });
        }

        function updateDetailView(clusterName) {
            const groups = currentTab === 'problem' ? problemGroups : methodologyGroups;
            const cluster = groups[clusterName];

            // Update Summary Card
            document.getElementById('selected-cluster-name').innerText = clusterName;
            document.getElementById('selected-cluster-summary').innerText = cluster.summary || "이 연구 영역에 속한 논문들의 흐름입니다.";

            // Sub-cluster drill-down link
            const subLinkEl = document.getElementById('sub-cluster-link');
            if (cluster.sub_page_url) {
                subLinkEl.innerHTML = `<a href="${cluster.sub_page_url}" class="inline-flex items-center gap-2 text-white/80 hover:text-white text-sm font-bold transition-colors border border-white/30 hover:border-white/60 rounded-xl px-4 py-2 hover:bg-white/10">세부 클러스터 보기 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg></a>`;
            } else {
                subLinkEl.innerHTML = '';
            }

            // Build Detailed Paper Cards
            const container = document.getElementById('paper-list-container');
            container.innerHTML = '';

            cluster.papers.forEach(paper => {
                const card = document.createElement('div');
                card.className = 'bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 space-y-4 animate-slide-up hover:border-orange-200 transition-colors cursor-default';
                card.innerHTML = `
                    <div class="flex flex-col space-y-1">
                        <span class="text-[10px] font-bold text-orange-400 uppercase tracking-widest bg-orange-50 self-start px-2 py-0.5 rounded-md">${escapeHTML(paper.filename)}</span>
                        <h6 class="text-xl font-bold text-slate-800 leading-tight pt-1">${escapeHTML(paper.title)}</h6>
                    </div>
                    <div class="space-y-4 pt-2">
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Research Problem (해결하려는 문제)</p>
                            <p class="text-sm text-slate-600 leading-relaxed">${escapeHTML(paper.problem)}</p>
                        </div>
                        <div class="bg-orange-50/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1 italic">Key Methodology (해결 방법)</p>
                            <p class="text-sm text-slate-700 leading-relaxed font-medium">${escapeHTML(paper.methodology)}</p>
                        </div>
                        ${paper.limitation ? `
                        <div class="p-4 border border-slate-100 rounded-2xl">
                            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1 italic text-right">Trade-off / Limitation (한계점)</p>
                            <p class="text-xs text-slate-400 leading-relaxed text-right">${escapeHTML(paper.limitation)}</p>
                        </div>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });

            // Focus on Detail Section
            document.getElementById('detail-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Initialize display
        if (researchResults.length > 0) {
            initDashboard();
        } else {
            console.warn("No data injected into data points.");
        }
    </script>
</body>

</html>
