<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Cluster Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; font-weight: 800; }
        #tree-svg { cursor: grab; }
        #tree-svg:active { cursor: grabbing; }
        .node.has-link { cursor: pointer; }
        .node circle { transition: r 0.15s ease, filter 0.15s ease; }
        .node:hover circle { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.5)); }
        .link { fill: none; stroke: #e2e8f0; stroke-width: 1.5px; }
        .node-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; fill: #475569; pointer-events: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-8 border-b border-slate-200 pb-8">
            <div class="space-y-1">
                <h1 class="text-4xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-3">
                    <span class="w-10 h-10 accent-gradient rounded-xl shadow-lg shadow-orange-200"></span>
                    Cluster Tree
                </h1>
                <p class="text-slate-400 font-medium tracking-tight">Radial Hierarchy of Research Clusters</p>
            </div>
            <div class="flex items-center gap-4">
                <nav class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                    <button onclick="switchTab('problem')" id="tab-problem"
                        class="px-8 py-3 rounded-xl text-sm font-bold transition-all tab-active">Problem Clusters</button>
                    <button onclick="switchTab('method')" id="tab-method"
                        class="px-8 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">Methodology Clusters</button>
                </nav>
                <a href="#" class="inline-flex items-center gap-2 px-5 py-3 bg-white border border-slate-100 rounded-2xl text-sm font-bold text-slate-400 hover:text-orange-500 hover:border-orange-200 transition-all card-shadow">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    Dashboard
                </a>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            <div class="flex-grow bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
                <svg id="tree-svg" width="100%" height="680"></svg>
            </div>
            <div class="lg:w-72 flex-shrink-0 space-y-4">
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-2xl font-extrabold text-slate-900" id="total-count">—</p>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Papers Analyzed</p>
                    </div>
                </div>
                <div id="detail-card" class="bg-gradient-to-br from-orange-500 to-orange-600 p-6 rounded-[2rem] text-white card-shadow shadow-orange-100 space-y-3 animate-slide-up">
                    <p class="text-xs font-bold uppercase tracking-widest text-orange-200">노드를 선택하세요</p>
                    <h5 class="text-base font-extrabold leading-snug" id="detail-name">—</h5>
                    <div class="flex items-center gap-2">
                        <span class="text-2xl font-extrabold" id="detail-count">—</span>
                        <span class="text-orange-200 text-sm font-semibold" id="detail-count-label">papers</span>
                    </div>
                    <p class="text-orange-100 text-xs leading-relaxed" id="detail-summary"></p>
                    <a id="detail-link" href="#" class="hidden mt-1 inline-flex items-center gap-1.5 text-white/80 hover:text-white text-xs font-bold border border-white/30 hover:border-white/60 rounded-xl px-3 py-1.5 hover:bg-white/10 transition-all">
                        대시보드 열기
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 space-y-3">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Legend</p>
                    <div class="space-y-2.5">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full bg-orange-500 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">Root (전체 논문)</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full bg-white border-2 border-orange-400 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">클러스터 (하위 있음)</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-orange-100 border-2 border-orange-300 flex-shrink-0"></div>
                            <span class="text-xs font-semibold text-slate-600">리프 클러스터</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-center text-xs text-slate-300 pb-8 italic">※ 노드를 클릭하면 해당 클러스터의 대시보드로 이동합니다. 드래그로 이동, 스크롤로 줌.</p>
    </div>

    <script>
        const problemTreeData = {"name":"Research Map","url":"preview_index.html","count":8,"summary":"","children":[{"name":"효율적 추론 및 연산 최적화","url":"preview_sub_index.html","count":3,"summary":"모델 추론 속도와 메모리 효율을 높이기 위한 양자화, 프루닝, 지식 증류 기반 연구들로, 엣지 디바이스 배포를 목표로 합니다.","children":[{"name":"비트 단위 가중치 압축","url":"preview_sub_index.html","count":2,"summary":"INT8/INT4 양자화로 가중치를 압축하여 메모리 사용량과 추론 속도를 개선하는 연구.","children":[{"name":"LLM.int8(): 8-bit Matrix Multiplication for Transformers at Scale","filename":"llm_int8.pdf","url":"preview_sub_index.html","count":0,"summary":"대형 언어 모델을 GPU에서 추론할 때 메모리 요구량이 너무 커서 실용적 배포가 어렵다.","children":[],"is_paper":true},{"name":"GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers","filename":"gptq.pdf","url":"preview_sub_index.html","count":0,"summary":"수백억 파라미터 GPT 계열 모델을 정확도 손실 없이 4비트 이하로 양자화하는 효율적 방법이 부재하다.","children":[],"is_paper":true}]},{"name":"교사-학생 지식 이전","url":"preview_sub_index.html","count":1,"summary":"대형 교사 모델의 출력 분포와 내부 표현을 소형 학생 모델에 전달하는 연구.","children":[{"name":"DistilBERT, a distilled version of BERT: smaller, faster, cheaper and lighter","filename":"distilbert.pdf","url":"preview_sub_index.html","count":0,"summary":"BERT는 높은 성능을 제공하지만 파라미터 수가 많아 추론 지연과 메모리 비용이 크다.","children":[],"is_paper":true}]}]},{"name":"장문맥 이해 및 처리","url":"preview_index.html","count":2,"summary":"수만 토큰 이상의 긴 문서를 처리하기 위한 어텐션 메커니즘 개선 및 메모리 아키텍처 연구입니다.","children":[{"name":"Longformer: The Long-Document Transformer","filename":"longformer.pdf","url":"preview_index.html","count":0,"summary":"기존 Transformer의 Self-Attention은 O(n²) 복잡도로 긴 문서 처리가 불가능하다.","children":[],"is_paper":true},{"name":"FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness","filename":"flashattention.pdf","url":"preview_index.html","count":0,"summary":"표준 Self-Attention 구현은 HBM 접근 횟수가 많아 GPU 메모리 대역폭을 병목으로 만든다.","children":[],"is_paper":true}]},{"name":"멀티모달 정렬 및 이해","url":"preview_index.html","count":1,"summary":"언어와 시각 정보를 통합하여 이미지-텍스트 간 의미 정렬을 학습하는 연구 흐름입니다.","children":[{"name":"Learning Transferable Visual Models From Natural Language Supervision","filename":"clip.pdf","url":"preview_index.html","count":0,"summary":"기존 시각 모델은 고정된 카테고리 집합에 의존하여 zero-shot 일반화 능력이 부족하다.","children":[],"is_paper":true}]},{"name":"LLM 추론 능력 및 정렬","url":"preview_index.html","count":2,"summary":"Chain-of-Thought, LoRA 등 단계적 추론과 파라미터 효율 학습으로 모델 능력을 높이는 연구입니다.","children":[{"name":"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models","filename":"chain_of_thought.pdf","url":"preview_index.html","count":0,"summary":"대형 언어 모델은 수학 추론, 상식 추론 등 다단계 사고가 필요한 문제에서 성능이 낮다.","children":[],"is_paper":true},{"name":"LoRA: Low-Rank Adaptation of Large Language Models","filename":"lora.pdf","url":"preview_index.html","count":0,"summary":"대형 언어 모델의 전체 파인튜닝은 파라미터 수에 비례하는 GPU 메모리와 스토리지가 필요해 실용적이지 않다.","children":[],"is_paper":true}]}]};

        const methodTreeData = {"name":"Research Map","url":"preview_index.html","count":8,"summary":"","children":[{"name":"양자화 및 경량화","url":"preview_index.html","count":2,"summary":"Post-training quantization과 혼합 정밀도 기법으로 모델 크기를 줄이는 방법론.","children":[{"name":"LLM.int8(): 8-bit Matrix Multiplication for Transformers at Scale","filename":"llm_int8.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true},{"name":"GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers","filename":"gptq.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true}]},{"name":"지식 증류","url":"preview_index.html","count":1,"summary":"대형 모델의 지식을 소형 모델로 전달하는 distillation 기법 연구.","children":[{"name":"DistilBERT, a distilled version of BERT: smaller, faster, cheaper and lighter","filename":"distilbert.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true}]},{"name":"효율적 어텐션 메커니즘","url":"preview_index.html","count":2,"summary":"Sparse Attention, IO-aware 블록 계산 등으로 어텐션 복잡도를 줄이는 방법론.","children":[{"name":"Longformer: The Long-Document Transformer","filename":"longformer.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true},{"name":"FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness","filename":"flashattention.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true}]},{"name":"대조 학습 기반 표현","url":"preview_index.html","count":1,"summary":"Positive/Negative 쌍 대조 학습으로 멀티모달 의미 공간을 구축하는 방법론.","children":[{"name":"Learning Transferable Visual Models From Natural Language Supervision","filename":"clip.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true}]},{"name":"파라미터 효율적 학습","url":"preview_index.html","count":2,"summary":"LoRA, 프롬프트 기법 등 소수 파라미터만 학습하거나 추론을 유도하는 방법론.","children":[{"name":"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models","filename":"chain_of_thought.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true},{"name":"LoRA: Low-Rank Adaptation of Large Language Models","filename":"lora.pdf","url":"preview_index.html","count":0,"summary":"","children":[],"is_paper":true}]}]};

        const svgEl = document.getElementById('tree-svg');
        const width = svgEl.parentElement.clientWidth || 720;
        const height = 700;
        const svg = d3.select('#tree-svg').attr('width', width).attr('height', height);
        const zoomGroup = svg.append('g');
        const zoom = d3.zoom().scaleExtent([0.25, 4]).on('zoom', e => zoomGroup.attr('transform', e.transform));
        svg.call(zoom);

        function switchTab(type) {
            document.getElementById('tab-problem').classList.toggle('tab-active', type === 'problem');
            document.getElementById('tab-method').classList.toggle('tab-active', type === 'method');
            document.getElementById('tab-problem').classList.toggle('text-slate-400', type !== 'problem');
            document.getElementById('tab-method').classList.toggle('text-slate-400', type !== 'method');
            renderTree(type === 'problem' ? problemTreeData : methodTreeData);
        }

        function nodeRadius(d) {
            if (d.depth === 0) return 24;
            if (d.data.is_paper) return 4;
            return d.children?.length ? 9 : 7;
        }

        function toXY(d) { return [d.y * Math.sin(d.x), -d.y * Math.cos(d.x)]; }

        function renderTree(data) {
            zoomGroup.selectAll('*').remove();
            svg.call(zoom.transform, d3.zoomIdentity);
            if (!data || !data.children?.length) return;
            document.getElementById('total-count').innerText = data.count ?? '—';

            const cx = width / 2, cy = height / 2;
            const radius = Math.min(width, height) / 2 - 180;
            const g = zoomGroup.append('g').attr('transform', `translate(${cx},${cy})`);

            const tree = d3.tree()
                .size([2 * Math.PI, radius])
                .separation((a, b) => (a.parent === b.parent ? 2 : 4) / Math.max(a.depth, 1));

            const root = d3.hierarchy(data);
            tree(root);

            const levelR = [0, 130, 260, 400, 540];
            root.each(d => { if (d.depth > 0) d.y = levelR[Math.min(d.depth, levelR.length - 1)]; });

            g.append('g').selectAll('path').data(root.links()).join('path')
                .attr('class', 'link')
                .attr('d', d3.linkRadial().angle(d => d.x).radius(d => d.y));

            const node = g.append('g').selectAll('g').data(root.descendants()).join('g')
                .attr('class', d => `node${d.data.url ? ' has-link' : ''}`)
                .attr('transform', d => { const [x,y] = toXY(d); return `translate(${x},${y})`; })
                .on('mouseover', function(_, d) {
                    d3.select(this).select('circle').attr('r', nodeRadius(d) * 1.4);
                    showDetail(d.data);
                })
                .on('mouseout', function(_, d) { d3.select(this).select('circle').attr('r', nodeRadius(d)); })
                .on('click', (_, d) => { if (d.data.url) window.location.href = d.data.url; });

            node.append('circle')
                .attr('r', nodeRadius)
                .attr('fill', d => d.depth===0 ? '#f97316' : d.data.is_paper ? '#fff7ed' : d.children?.length ? '#ffffff' : '#fff7ed')
                .attr('stroke', d => d.depth===0 ? 'none' : d.data.is_paper ? '#fdba74' : '#f97316')
                .attr('stroke-width', d => d.depth===0 ? 0 : 1.5);

            node.filter(d => d.depth === 0).append('text')
                .attr('text-anchor','middle').attr('dominant-baseline','middle')
                .attr('font-size','10px').attr('font-weight','800').attr('fill','#fff')
                .attr('pointer-events','none').text('ALL');

            node.filter(d => d.depth > 0).each(function(d) {
                const [cx, cy] = toXY(d);
                const dist = Math.sqrt(cx*cx + cy*cy) || 1;
                const ux = cx/dist, uy = cy/dist;
                const r = nodeRadius(d), gap = d.data.is_paper ? 5 : 7;
                const ax = ux*(r+gap), ay = uy*(r+gap);
                const isPaper = !!d.data.is_paper;
                const grp = d3.select(this);

                if (isPaper) {
                    const fnRaw = d.data.filename || '';
                    const fnLabel = fnRaw.length > 20 ? fnRaw.substr(0, 20) + '…' : fnRaw;
                    const maxTitle = 30;
                    const titleLabel = d.data.name.length > maxTitle ? d.data.name.substr(0, maxTitle)+'…' : d.data.name;
                    const charW = 5.0;
                    const boxW = Math.min(Math.max(fnLabel.length, titleLabel.length) * charW + 20, 180);
                    const boxH = 38;
                    let boxX;
                    if (ux > 0.2) boxX = ax;
                    else if (ux < -0.2) boxX = ax - boxW;
                    else boxX = ax - boxW/2;
                    const boxY = ay - boxH/2;
                    grp.append('rect')
                        .attr('x', boxX).attr('y', boxY).attr('width', boxW).attr('height', boxH).attr('rx', 6)
                        .attr('fill', '#fff7ed').attr('stroke', '#fdba74').attr('stroke-width', 1);
                    grp.append('text')
                        .attr('x', boxX+boxW/2).attr('y', boxY+13)
                        .attr('text-anchor','middle').attr('dominant-baseline','middle')
                        .attr('font-size','8px').attr('font-weight','700').attr('fill','#ea580c')
                        .attr('pointer-events','none').text(`[${fnLabel}]`);
                    grp.append('text')
                        .attr('x', boxX+boxW/2).attr('y', boxY+27)
                        .attr('text-anchor','middle').attr('dominant-baseline','middle')
                        .attr('font-size','9px').attr('font-weight','400').attr('fill','#92400e')
                        .attr('pointer-events','none').text(titleLabel);
                } else {
                    const maxLen = 20;
                    const label = d.data.name.length > maxLen ? d.data.name.substr(0, maxLen)+'…' : d.data.name;
                    const charW = 6.0;
                    const boxH = 22;
                    const boxW = Math.min(label.length * charW + 20, 140);
                    let boxX;
                    if (ux > 0.2) boxX = ax;
                    else if (ux < -0.2) boxX = ax - boxW;
                    else boxX = ax - boxW/2;
                    const boxY = ay - boxH/2;
                    grp.append('rect')
                        .attr('x', boxX).attr('y', boxY).attr('width', boxW).attr('height', boxH).attr('rx', 6)
                        .attr('fill', '#f8fafc').attr('stroke', '#e2e8f0').attr('stroke-width', 1);
                    grp.append('text')
                        .attr('x', boxX+boxW/2).attr('y', boxY+boxH/2)
                        .attr('text-anchor','middle').attr('dominant-baseline','middle')
                        .attr('font-size','10px').attr('font-weight','700').attr('fill','#334155')
                        .attr('pointer-events','none').text(label);
                }
            });
        }

        function showDetail(data) {
            document.getElementById('detail-name').innerText = data.name;
            document.getElementById('detail-count').innerText = data.is_paper ? '논문' : (data.count ?? '—');
            document.getElementById('detail-count-label').innerText = data.is_paper ? '' : 'papers';
            document.getElementById('detail-summary').innerText = data.summary || '';
            const linkEl = document.getElementById('detail-link');
            if (data.url) { linkEl.href = data.url; linkEl.classList.remove('hidden'); }
            else { linkEl.classList.add('hidden'); }
        }

        renderTree(problemTreeData);
    </script>
</body>
</html>
